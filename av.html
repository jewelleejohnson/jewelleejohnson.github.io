<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audiovisual | Jewel Lee-Johnson</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
:root { --cyber-green:#00ffcc; }
*{box-sizing:border-box;}

body{
  margin:0;
  padding:60px;
  font-family:'Fira Code',monospace;
  color:#fff;
  background:url("AVImage/XCSIBER01.jpg") center/cover fixed;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  z-index:-1;
}

/* NAV */
nav{margin-bottom:80px;}
nav a{
  margin-right:32px;
  font-size:15px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--cyber-green);
  text-decoration:none;
}

/* TITLES */
h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:48px;
  letter-spacing:.14em;
  color:var(--cyber-green);
}
.subtitle{opacity:.7;margin-bottom:60px;}

/* PROJECT GRID */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
  gap:18px;
  max-width:900px;
}
.project{
  border:1px solid #fff;
  aspect-ratio:4/3;
  padding:10px;
  cursor:pointer;
}
.project img, .project video{
  width:100%;
  height:calc(100% - 26px);
  object-fit:cover;
  border:1px solid #fff;
}
.project-title{
  margin-top:6px;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:none;
  z-index:1000;
}
.overlay.active{display:flex;}
.overlay-inner{
  max-width:1700px;
  margin:auto;
  display:grid;
  grid-template-columns:1.6fr 1fr;
  gap:48px;
}
.overlay-media{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
}
.overlay-media img,
.overlay-media video,
.overlay-media iframe{
  width:100%;
  aspect-ratio:16/9;
  border:1px solid #fff;
}
.overlay-text{
  white-space:pre-line;
  line-height:1.8;
}
.exit{
  position:fixed;
  top:32px;
  right:40px;
  font-size:28px;
  cursor:pointer;
}

/* FOOTER */
footer{
  margin-top:140px;
  color:var(--cyber-green);
}
footer a{
  margin-right:24px;
  color:var(--cyber-green);
  text-decoration:none;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="assets.html">3D Assets</a>
  <a href="av.html">Audiovisual</a>
  <a href="resume.html">Resume</a>
</nav>

<h1>Audiovisual</h1>
<p class="subtitle">// Experimental, XR, and motion-based work</p>

<section class="projects">
  <div class="project" onclick="openProject('glitchjungle')">
    <video src="AVImage/LooptrimGlitch.mp4" autoplay muted loop playsinline></video>
    <div class="project-title">Glitch Jungle Commission</div>
  </div>

  <div class="project" onclick="openProject('openstudios')">
    <img src="AVImage/Alex01.jpg">
    <div class="project-title">Open Studios at RISD</div>
  </div>

  <div class="project" onclick="openProject('neorat')">
    <img src="AVImage/XCSIBER01.jpg">
    <div class="project-title">NEORAT</div>
  </div>

  <div class="project" onclick="openProject('dystopia')">
    <img src="AVImage/XCSIBER01.jpg">
    <div class="project-title">Dystopia</div>
  </div>
</section>

<footer>
  Contact — jewelleejohnson@gmail.com<br><br>
  <a href="https://www.linkedin.com/in/jleejohnson" target="_blank">LinkedIn</a>
  <a href="https://www.artstation.com/jewelleejohnson" target="_blank">ArtStation</a>
  <a href="https://www.instagram.com/jewel.fbx/" target="_blank">Instagram</a>
</footer>

<div class="overlay" id="overlay" onclick="closeProject(event)">
  <div class="exit" onclick="closeProject()">✕</div>
  <div class="overlay-inner" id="overlayContent"></div>
</div>

<script>
function openProject(p){
  const o=document.getElementById('overlay');
  const c=document.getElementById('overlayContent');
  document.body.style.overflow='hidden';

  if(p==='neorat'){
    c.innerHTML=`
      <div class="overlay-media">
        <iframe src="https://player.vimeo.com/video/1169447886?autoplay=1&muted=1"
        frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
      </div>
      <div class="overlay-text">
NEORAT

Audiovisual work exploring synthetic organisms and urban decay.
      </div>`;
  }

  if(p==='dystopia'){
    c.innerHTML=`
      <div class="overlay-media">
        <iframe src="https://player.vimeo.com/video/1169447859?autoplay=1&muted=1"
        frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
      </div>
      <div class="overlay-text">
Dystopia

Experimental moving image focused on repetition and collapse.
      </div>`;
  }

  if(p==='glitchjungle'){
    c.innerHTML=`<div class="overlay-text">Glitch Jungle</div>`;
  }

  if(p==='openstudios'){
    c.innerHTML=`<div class="overlay-text">Open Studios at RISD</div>`;
  }

  o.classList.add('active');
}

function closeProject(e){
  if(!e||e.target.id==='overlay'){
    overlay.classList.remove('active');
    document.body.style.overflow='';
  }
}
</script>

</body>
</html>
