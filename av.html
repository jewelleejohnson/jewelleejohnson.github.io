```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audiovisual</title>

<style>

body {
  font-family: Arial, sans-serif;
  margin: 40px;
  background: #000;
  color: #fff;
}

/* Header */

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 60px;
}

.header h1 {
  font-size: 20px;
  font-weight: normal;
}

.nav a {
  margin-left: 20px;
  color: #fff;
  text-decoration: none;
}

.nav a:hover {
  text-decoration: underline;
}

/* Projects grid */

.projects {
  display: grid;
  grid-template-rows: repeat(2, auto);
  grid-auto-flow: column;
  gap: 18px;
  max-width: 100%;
}

.project {
  position: relative;
  cursor: pointer;
}

.project img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  border: 1px solid #fff;
}

.project-title {
  margin-top: 6px;
  font-size: 13px;
}

/* Overlay */

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: none;
  overflow: auto;
}

.overlay-inner {
  max-width: 1100px;
  margin: 80px auto;
  padding: 40px;
}

.overlay-close {
  position: absolute;
  top: 30px;
  right: 40px;
  font-size: 22px;
  cursor: pointer;
}

/* Media */

.overlay-media img,
.overlay-media video,
.overlay-media iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  border: 1px solid #fff;
}

/* Text */

.overlay-text {
  margin-top: 20px;
  font-size: 14px;
  line-height: 1.6;
}

/* Footer */

.footer {
  margin-top: 80px;
  font-size: 13px;
}

</style>
</head>

<body>

<div class="header">
  <h1>Audiovisual</h1>

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="3d.html">3D Assets</a>
    <a href="audiovisual.html">Audiovisual</a>
  </div>
</div>

<section class="projects">

<div class="project" onclick="openProject('glitch')">
  <img src="AVImage/glitch.jpg">
  <div class="project-title">Glitch Jungle</div>
</div>

<div class="project" onclick="openProject('openstudios')">
  <img src="AVImage/openstudios.jpg">
  <div class="project-title">Open Studios</div>
</div>

<div class="project" onclick="openProject('congee')">
  <img src="AVImage/congee.jpg">
  <div class="project-title">Congee Studios</div>
</div>

<div class="project" onclick="openProject('rat')">
  <img src="AVImage/rat.jpg">
  <div class="project-title">Rat</div>
</div>

<div class="project" onclick="openProject('chan')">
  <img src="AVImage/CHAN.PNG">
  <div class="project-title">Chan</div>
</div>

</section>

<div class="footer">
© 2026
</div>

<div class="overlay" id="overlay">
  <div class="overlay-close" onclick="closeOverlay()">✕</div>
  <div class="overlay-inner" id="overlay-content"></div>
</div>

<script>

function openProject(project) {

const overlay = document.getElementById("overlay");
const content = document.getElementById("overlay-content");

overlay.style.display = "block";

/* Glitch */

if (project === "glitch") {

content.innerHTML = `
<div class="overlay-media">
<video src="videos/glitch.mp4" autoplay loop muted controls></video>
</div>

<div class="overlay-text">
Glitch Jungle

Audiovisual experiment exploring digital distortion and rhythmic motion.
</div>
`;

}

/* Open Studios */

if (project === "openstudios") {

content.innerHTML = `
<div class="overlay-media">
<video src="videos/openstudios.mp4" autoplay loop muted controls></video>
</div>

<div class="overlay-text">
Open Studios

Documentation and visual composition created for the Open Studios event.
</div>
`;

}

/* Congee */

if (project === "congee") {

content.innerHTML = `
<div class="overlay-media">
<video src="videos/congee.mp4" autoplay loop muted controls></video>
</div>

<div class="overlay-text">
Congee Studios

Audiovisual work produced for Congee Studios.
</div>
`;

}

/* Rat */

if (project === "rat") {

content.innerHTML = `
<div class="overlay-media">
<iframe 
src="https://player.vimeo.com/video/1169447886?muted=1&autoplay=1&loop=1&title=0&byline=0&portrait=0" 
frameborder="0" 
allow="autoplay; fullscreen" 
allowfullscreen>
</iframe>
</div>

<div class="overlay-text">
Rat

Audiovisual motion work.
</div>
`;

}

/* Chan */

if (project === "chan") {

content.innerHTML = `
<div class="overlay-media">
<iframe 
src="https://player.vimeo.com/video/1169447859?muted=1&autoplay=1&loop=1&title=0&byline=0&portrait=0" 
frameborder="0" 
allow="autoplay; fullscreen" 
allowfullscreen>
</iframe>
</div>

<div class="overlay-text">
Chan

Audiovisual motion work.
</div>
`;

}

}

function closeOverlay() {

document.getElementById("overlay").style.display = "none";

}

</script>

</body>
</html>
