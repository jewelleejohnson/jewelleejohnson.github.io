<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audiovisual | Jewel Lee-Johnson</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --cyber-green: #00ffcc;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 60px;
  font-family: 'Fira Code', monospace;
  color: #fff;
  background-image: url("images/jewel-johnson-asset4.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: -1;
}

/* ---------- GLITCH ---------- */
.glitch {
  position: relative;
  display: inline-block;
}

.glitch:hover::after {
  content: attr(data-text);
  position: absolute;
  left: 2px;
  top: 0;
  width: 100%;
  color: inherit;
  clip-path: inset(40% 0 45% 0);
  animation: glitchX 0.25s steps(2) infinite;
}

@keyframes glitchX {
  0% { transform: translateX(0); }
  50% { transform: translateX(-3px); }
  100% { transform: translateX(3px); }
}

/* ---------- NAV ---------- */
nav {
  margin-bottom: 80px;
}

nav a {
  margin-right: 32px;
  font-size: 15px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cyber-green);
  text-decoration: none;
}

/* ---------- PAGE TITLE ---------- */
h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 48px;
  letter-spacing: 0.14em;
  margin-bottom: 10px;
  color: var(--cyber-green);
}

.subtitle {
  font-size: 15px;
  opacity: 0.7;
  margin-bottom: 60px;
}

/* ---------- PROJECT GRID ---------- */
.projects {
  display: grid;
  grid-template-rows: repeat(2, auto);
  grid-auto-flow: column;
  gap: 18px;
  max-width: 95%;
}

.project {
  border: 1px solid #fff;
  aspect-ratio: 4 / 3;
  padding: 10px;
  cursor: pointer;
  transition: box-shadow 0.3s ease;
}

.project:hover {
  box-shadow:
    0 0 10px rgba(0,255,204,0.5),
    0 0 20px rgba(0,255,204,0.25);
}

.project img,
.project video {
  width: 100%;
  height: calc(100% - 26px);
  object-fit: cover;
  border: 1px solid #fff;
}

.project-title {
  margin-top: 6px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ---------- OVERLAY ---------- */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  z-index: 1000;
  overflow-y:auto;
}

.overlay.active {
  display: flex;
}

.overlay-inner {
  max-width: 1700px;
  margin: auto;
  display: grid;
  grid-template-columns: 3fr 1fr;
  gap: 48px;
}

.overlay-media {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.overlay-media img,
.overlay-media video,
.overlay-media iframe {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border: 1px solid #fff;
  cursor: pointer;
}

.overlay-text {
  font-size: 15px;
  line-height: 1.8;
  white-space: pre-line;
}

.exit {
  position: fixed;
  top: 32px;
  right: 40px;
  font-size: 28px;
  cursor: pointer;
  color: #fff;
}

/* ---------- VIEWER ---------- */
.viewer {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  display: none;
  z-index: 2000;
  align-items: center;
  justify-content: center;
}

.viewer.active {
  display: flex;
}

.viewer-content img,
.viewer-content video {
  max-width: 92vw;
  max-height: 92vh;
  border: 1px solid #fff;
}

.viewer .exit {
  top: 24px;
  right: 32px;
}

/* ---------- FOOTER ---------- */
footer {
  margin-top: 140px;
  font-size: 16px;
  color: var(--cyber-green);
}

footer a {
  margin-right: 24px;
  color: var(--cyber-green);
  text-decoration: none;
}


/* ---------- MOBILE SUPPORT (ONLY ADDITION) ---------- */

@media (max-width:768px){

body{
padding:30px;
}

nav a{
display:inline-block;
margin-right:18px;
margin-bottom:10px;
font-size:13px;
}

h1{
font-size:32px;
}

.projects{
grid-auto-flow:row;
grid-template-columns:1fr;
}

.overlay-inner{
grid-template-columns:1fr;
gap:32px;
}

.overlay-text{
font-size:14px;
}

}

</style>
</head>
